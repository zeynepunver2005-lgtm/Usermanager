<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom · Profil</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-hero {
      background: #ffffff;
      border: 1px solid #F4C0D1;
      border-radius: 24px;
      padding: 36px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .profile-avatar-large {
      width: 84px; height: 84px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C084FC, #F4C0D1);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: 1px;
    }
    .profile-name { font-size: 20px; font-weight: 700; color: #1E1E2E; margin: 0; }
    .profile-email-text { font-size: 13px; color: #9CA3AF; margin: 0; }
    .bio-view { font-size: 14px; color: #4B5563; text-align: center; max-width: 420px; line-height: 1.6; font-style: italic; }
    .bio-empty { font-size: 13px; color: #C084FC; text-align: center; cursor: pointer; }
    .profile-actions-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

    .edit-panel {
      background: #ffffff; border: 1px solid #F4C0D1;
      border-radius: 20px; padding: 24px 28px; margin-bottom: 16px; display: none;
    }
    .edit-panel h3 { font-size: 15px; font-weight: 600; color: #7C3AED; margin: 0 0 18px; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .edit-grid .full-width { grid-column: 1 / -1; }
    .edit-label { display: block; font-size: 12px; font-weight: 500; color: #9CA3AF; margin-bottom: 5px; }
    .edit-input {
      width: 100%; border: 1px solid #E9D5FF; border-radius: 12px;
      padding: 9px 14px; font-size: 14px; font-family: 'Poppins', sans-serif;
      color: #1E1E2E; background: #FFF8F5; outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    .edit-input:focus { border-color: #C084FC; }
    .edit-textarea { resize: vertical; min-height: 72px; }
    .edit-error { font-size: 12px; color: #EF4444; margin-top: 10px; min-height: 18px; }
    .edit-footer { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

    /* Şifre paneli — biraz farklı border rengi */
    .password-panel {
      background: #ffffff; border: 1px solid #E9D5FF;
      border-radius: 20px; padding: 24px 28px; margin-bottom: 16px; display: none;
    }
    .password-panel h3 { font-size: 15px; font-weight: 600; color: #7C3AED; margin: 0 0 18px; }

    .tabs-bar {
      display: flex; gap: 4px; background: #ffffff;
      border: 1px solid #F4C0D1; border-radius: 16px; padding: 6px; margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; padding: 9px 6px; font-size: 13px; font-weight: 500;
      font-family: 'Poppins', sans-serif; color: #9CA3AF; background: transparent;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn:hover { color: #7C3AED; background: #FAF0FF; }
    .tab-btn.active { background: #7C3AED; color: #ffffff; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .item-card {
      background: #ffffff; border: 1px solid #F4C0D1;
      border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; transition: box-shadow 0.15s;
    }
    .item-card:hover { box-shadow: 0 2px 12px rgba(192,132,252,0.12); }
    .item-card-meta { font-size: 11px; color: #C084FC; font-weight: 500; margin-bottom: 5px; }
    .item-card-text { font-size: 14px; color: #1E1E2E; line-height: 1.55; }
    .item-card-ref { font-size: 12px; color: #9CA3AF; margin-top: 6px; padding-top: 6px; border-top: 1px solid #F9E8FF; }
    .item-card-actions { display: flex; gap: 8px; margin-top: 10px; }

    .inline-edit-area { display: none; margin-top: 10px; flex-direction: column; gap: 8px; }
    .inline-edit-area textarea,
    .inline-edit-area input[type="text"] {
      width: 100%; border: 1px solid #E9D5FF; border-radius: 12px;
      padding: 9px 14px; font-size: 14px; font-family: 'Poppins', sans-serif;
      color: #1E1E2E; background: #FFF8F5; outline: none; resize: none; box-sizing: border-box;
    }
    .inline-edit-area textarea { min-height: 70px; }
    .inline-edit-btns { display: flex; gap: 8px; }

    .empty-msg { font-size: 13px; color: #9CA3AF; padding: 24px 0; text-align: center; }

    .danger-zone {
      margin-top: 32px; padding: 20px 24px;
      border: 1px dashed #F4C0D1; border-radius: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .danger-zone-text p { margin: 0; font-size: 14px; font-weight: 600; color: #1E1E2E; }
    .danger-zone-text span { font-size: 12px; color: #9CA3AF; }

    .coming-soon {
      text-align: center; padding: 40px 20px;
      color: #C084FC; font-size: 14px;
    }
    .coming-soon div { font-size: 32px; margin-bottom: 10px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">🌸 bloom</a>
  <div class="navbar-right" id="navbar-right"></div>
</nav>

<main class="container" style="max-width:680px;margin:0 auto;padding:24px 16px 60px">

  <!-- Hero -->
  <div class="profile-hero" id="profile-hero" style="display:none">
    <div class="profile-avatar-large" id="hero-avatar"></div>
    <div style="text-align:center">
      <p class="profile-name" id="hero-username"></p>
      <p class="profile-email-text" id="hero-email"></p>
    </div>
    <div id="bio-display">
      <p class="bio-view" id="bio-text" style="display:none"></p>
      <p class="bio-empty" id="bio-empty" onclick="openEditPanel()" style="display:none">+ Bio hinzufügen…</p>
    </div>
    <div class="profile-actions-row">
      <button class="btn-outline" onclick="openEditPanel()">✏️ Bearbeiten</button>
      <button class="btn-outline" onclick="openPasswordPanel()" style="border-color:#E9D5FF;color:#9CA3AF">🔑 Passwort ändern</button>
    </div>
  </div>

  <!-- Profil düzenleme -->
  <div class="edit-panel" id="edit-panel">
    <h3>Profil bearbeiten</h3>
    <div class="edit-grid">
      <div>
        <label class="edit-label">Vorname</label>
        <input class="edit-input" id="edit-firstname" type="text" autocomplete="off" />
      </div>
      <div>
        <label class="edit-label">Nachname</label>
        <input class="edit-input" id="edit-lastname" type="text" autocomplete="off" />
      </div>
      <div>
        <label class="edit-label">Benutzername</label>
        <input class="edit-input" id="edit-username" type="text" autocomplete="off" />
      </div>
      <div>
        <label class="edit-label">E-Mail</label>
        <input class="edit-input" id="edit-email" type="email" autocomplete="off" />
      </div>
      <div class="full-width">
        <label class="edit-label">Bio</label>
        <textarea class="edit-input edit-textarea" id="edit-bio" placeholder="Schreib etwas über dich…"></textarea>
      </div>
    </div>
    <div class="edit-error" id="edit-error"></div>
    <div class="edit-footer">
      <button class="btn-outline" onclick="closeEditPanel()">Abbrechen</button>
      <button class="btn-primary" onclick="saveProfile()">Speichern</button>
    </div>
  </div>

  <!-- Şifre değiştir -->
  <div class="password-panel" id="password-panel">
    <h3>🔑 Passwort ändern</h3>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label class="edit-label">Aktuelles Passwort</label>
        <input class="edit-input" id="pw-old" type="password" autocomplete="current-password" />
      </div>
      <div>
        <label class="edit-label">Neues Passwort <span style="color:#C084FC">(min. 6 Zeichen)</span></label>
        <input class="edit-input" id="pw-new" type="password" autocomplete="new-password" />
      </div>
      <div>
        <label class="edit-label">Neues Passwort wiederholen</label>
        <input class="edit-input" id="pw-confirm" type="password" autocomplete="new-password" />
      </div>
    </div>
    <div class="edit-error" id="pw-error"></div>
    <div class="edit-footer">
      <button class="btn-outline" onclick="closePasswordPanel()">Abbrechen</button>
      <button class="btn-primary" onclick="savePassword()">Passwort ändern</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('posts')">📝 Meine Posts</button>
    <button class="tab-btn" onclick="switchTab('comments')">💬 Meine Kommentare</button>
    <button class="tab-btn" onclick="switchTab('reactions')">❤️ Meine Reaktionen</button>
  </div>

  <div class="tab-pane active" id="tab-posts">
    <div id="my-posts-list"><div class="empty-msg">Lade…</div></div>
  </div>
  <div class="tab-pane" id="tab-comments">
    <div id="my-comments-list"><div class="empty-msg">Lade…</div></div>
  </div>
  <div class="tab-pane" id="tab-reactions">
    <div class="coming-soon">
      <div>✨</div>
      Meine Reaktionen — demnächst verfügbar
    </div>
  </div>

  <!-- Danger zone -->
  <div class="danger-zone">
    <div class="danger-zone-text">
      <p>Account löschen</p>
      <span>Alle Posts und Kommentare werden unwiderruflich gelöscht.</span>
    </div>
    <button class="btn-delete" style="border-radius:20px;padding:9px 20px;font-size:13px" onclick="confirmDeleteAccount()">Account löschen</button>
  </div>

</main>

<div class="modal-overlay" id="shared-modal">
  <div class="modal-box" id="shared-modal-box" style="position:relative;gap:20px;max-width:360px;text-align:center"></div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
